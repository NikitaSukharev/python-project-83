{% extends "base.html" %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h1 class="display-4 mb-2">Анализатор страниц</h1>
      <p class="lead text-muted mb-4">
        Проверьте сайт на SEO-пригодность
      </p>
      <form action="{{ url_for('add_url') }}" method="post">
        <div class="input-group input-group-lg">
          <input
            type="text"
            name="url"
            id="url"
            class="form-control"
            placeholder="https://www.example.com"
            value="{{ request.form.url | default('') }}"
          >
          <button type="submit" class="btn btn-primary px-5">
            Проверить
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
